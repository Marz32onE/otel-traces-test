services:
  mongodb:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-repl-healthcheck.js:/tmp/mongo-repl-healthcheck.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--file", "/tmp/mongo-repl-healthcheck.js"]
      interval: 5s
      timeout: 20s
      retries: 18
      start_period: 45s

  mongo-express:
    image: mongo-express:latest
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "3002:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  nats:
    image: nats:alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  tempo:
    image: grafana/tempo:2.9.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./charts/otel-traces-test/config/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./charts/otel-traces-test/config/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317"
      - "4318:4318"
    depends_on:
      - tempo

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - tempo

  nats-trace-watcher:
    build:
      context: .
      dockerfile: nats-trace-watcher/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_TRACE_DEST=nats.trace.events
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_TRACE_DEST=nats.trace.events
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - MONGODB_URI=mongodb://mongodb:27017
      - WORKER_URL=http://worker:8082
    ports:
      - "8088:8088"
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  api-mongo-v1:
    build:
      context: .
      dockerfile: api-mongo-v1/Dockerfile
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      - MONGODB_URI=mongodb://mongodb:27017
    ports:
      - "8089:8089"
    depends_on:
      mongodb:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - NATS_URL=nats://nats:4222
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  dbwatcher:
    build:
      context: .
      dockerfile: dbwatcher/Dockerfile
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - NATS_URL=nats://nats:4222
      - NATS_TRACE_DEST=nats.trace.events
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8088
        - VITE_API_V1_URL=http://localhost:8089
        - VITE_WS_URL=ws://localhost:8082
        - VITE_OTEL_COLLECTOR_URL=http://localhost:4318
    ports:
      - "3000:3000"
    depends_on:
      - api
      - api-mongo-v1
      - worker
    restart: unless-stopped

volumes:
  mongodb_data:
  nats_data:
  tempo_data:
  grafana_data:
