apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-otel-collector
  labels:
    app: otel-collector
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 4317
      targetPort: 4317
      nodePort: {{ .Values.nodePorts.otelCollectorGrpc }}
    - name: http
      port: 4318
      targetPort: 4318
      nodePort: {{ .Values.nodePorts.otelCollectorHttp }}
  selector:
    app: otel-collector
