apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-mongo-healthcheck
  labels:
    app: mongodb
data:
  mongo-repl-healthcheck.js: |
    try {
      var s = rs.status();
      if (s.ok === 1) quit(0);
    } catch (e) {
      try {
        rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
      } catch (e2) {}
    }
    quit(1);
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mongodb
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: "{{ .Values.mongodb.image.repository }}:{{ .Values.mongodb.image.tag }}"
          imagePullPolicy: {{ .Values.mongodb.image.pullPolicy }}
          command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: healthcheck
              mountPath: /tmp/mongo-repl-healthcheck.js
              subPath: mongo-repl-healthcheck.js
          readinessProbe:
            exec:
              command: ["mongosh", "--quiet", "--file", "/tmp/mongo-repl-healthcheck.js"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 20
            failureThreshold: 18
      volumes:
        - name: data
          emptyDir: {}
        - name: healthcheck
          configMap:
            name: {{ .Release.Name }}-mongo-healthcheck
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
