apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-tempo
  labels:
    app: tempo
spec:
  type: NodePort
  ports:
    - name: http
      port: 3200
      targetPort: 3200
      nodePort: {{ .Values.nodePorts.tempo }}
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
  selector:
    app: tempo
