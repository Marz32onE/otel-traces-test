# golangci-lint v2. Run: golangci-lint run ./api/... ./worker/... etc.
# Or per module: cd api && golangci-lint run ./...
version: "2"

run:
  timeout: 2m
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    govet:
      enable-all: true
